# Render Blueprint — adjust service names to match your dashboard.
#
# Frontend (Static Site): siduravoda.onrender.com
# API (Web Service): siduravoda-server.onrender.com

services:
  - type: web
    name: siduravoda
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      # Frontend build does not need Chromium; skip the heavy download.
      - key: PUPPETEER_SKIP_DOWNLOAD
        value: "true"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: siduravoda-server
    runtime: node
    buildCommand: npm install && npm run install-chrome && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_ORIGIN
        value: https://siduravoda.onrender.com
      - key: VITE_API_BASE_URL
        value: https://siduravoda-server.onrender.com
      # Download Chromium during build into the project dir so puppeteer can
      # find it at runtime (build and runtime share /opt/render/project/src).
      - key: PUPPETEER_CACHE_DIR
        value: /opt/render/project/src/.cache/puppeteer

  - type: cron
    name: siduravoda-weekly-backup
    runtime: node
    schedule: "0 7 * * 0"
    buildCommand: "true"
    startCommand: >
      curl -fsS -X POST
      -H "Authorization: Bearer $BACKUP_CRON_SECRET"
      https://siduravoda-server.onrender.com/api/admin/backup/run
    envVars:
      - key: BACKUP_CRON_SECRET
        sync: false
